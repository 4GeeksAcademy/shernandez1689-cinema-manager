<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Asientos de Cine</title>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col gap-8 p-6 md:p-10">
      <header class="space-y-2">
        <h1 class="text-3xl font-black tracking-tight md:text-5xl">Gestor de Asientos de Cine</h1>
        <p class="text-sm text-slate-700 md:text-base">
          Haz clic en un asiento libre para reservarlo. Verde = libre, oscuro = ocupado.
        </p>
      </header>

      <section class="grid gap-6 md:grid-cols-[2fr,1fr]">
        <article class="rounded-2xl border border-slate-300 bg-white p-4 shadow-sm md:p-6">
          <h2 class="text-lg font-bold">Mapa visual de asientos</h2>
          <div class="mt-3 flex flex-wrap items-center gap-2">
            <label for="scenario-select" class="text-sm font-semibold text-slate-700">Escenario</label>
            <select
              id="scenario-select"
              class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800"
            >
              <option value="vacia">Sala vacia</option>
              <option value="parcial" selected>Sala parcialmente ocupada</option>
              <option value="casiLlena">Sala casi llena (asientos sueltos)</option>
              <option value="llena">Sala completamente llena</option>
            </select>
            <button
              id="btn-reset"
              type="button"
              class="rounded-md bg-slate-800 px-3 py-2 text-sm font-semibold text-white hover:bg-slate-700"
            >
              Reiniciar escenario
            </button>
            <button
              id="btn-reserve-pair"
              type="button"
              class="rounded-md bg-emerald-600 px-3 py-2 text-sm font-semibold text-white hover:bg-emerald-500"
            >
              Reservar par contiguo
            </button>
          </div>
          <div
            id="seat-map"
            class="mt-4 grid grid-cols-5 gap-2 sm:grid-cols-10"
            aria-label="Mapa de asientos"
          ></div>
        </article>

        <aside class="rounded-2xl border border-slate-300 bg-white p-4 shadow-sm md:p-6">
          <h2 class="text-lg font-bold">Estado de operaciones</h2>
          <p id="ui-message" class="mt-3 text-sm text-slate-800"></p>
          <p id="ui-stats" class="mt-3 text-sm text-slate-700"></p>
        </aside>
      </section>

      <section class="rounded-2xl border border-slate-300 bg-slate-950 p-4 text-slate-100 shadow-sm md:p-6">
        <h2 class="text-lg font-bold">Salida de pruebas por consola</h2>
        <pre id="app" class="mt-4 overflow-x-auto text-xs leading-relaxed md:text-sm"></pre>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
